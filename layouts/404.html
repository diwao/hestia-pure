<!DOCTYPE html>
<html lang="{{ with .Site.Language.Locale }}{{ . }}{{ else }}en{{ end }}">
{{ partial "head" . }}
<body>
  <div id="wrap" class="wrap">
    {{ partial "header" . }}
    <main class="main">
      <h2>404 Page not found.</h2>
      <p>The page you are looking for could not be found. The URL may be incorrect, or the page may have been removed.</p>
      <p>Please check the URL and try again, or return to the <a href="{{ .Site.Home.RelPermalink }}">home page</a>.</p>
    </main>
  </div>
{{ partial "js" . }}
</body>
</html>
